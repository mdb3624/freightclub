<!-- @dsCard group="Brand" viewport="700x160" name="Two Personas" subtitle="Shipper (cream/bronze desktop) vs Carrier (dark/copper mobile)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { margin: 0; font-family: var(--font-body); display: flex; height: 160px; }
  .half { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
  .title { font-size: 18px; font-weight: 700; }
  .sub { font-size: 12px; opacity: 0.7; }
  .pill { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
  .divider { width: 2px; background: linear-gradient(180deg, #C9A46A, #B08D57); }
</style>
</head>
<body>
  <div class="half" style="background:#EFEBE0">
    <div class="tag" style="color:var(--color-bronze)">Shipper / Administrator</div>
    <div class="title" style="color:#1A1A1A;font-family:var(--font-display)">"Classic Cream &amp; Metallic Bronze"</div>
    <div class="sub" style="color:#4A5568">Desktop · #EFEBE0 canvas · white panels · bronze CTAs</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span class="pill" style="background:#EFEBE0;border:1px solid #D0D0D0;color:#1A1A1A">Canvas</span>
      <span class="pill" style="background:linear-gradient(90deg,#C9A46A,#8C6D3F);color:white">Bronze CTA</span>
      <span class="pill" style="background:#FFFFFF;border:1px solid #D0D0D0;color:#1A1A1A">Panel</span>
    </div>
  </div>
  <div class="divider"></div>
  <div class="half" style="background:#121212">
    <div class="tag" style="color:#C9A876">Owner-Operator / Carrier</div>
    <div class="title" style="color:#F5F5F5;font-family:var(--font-display)">"Luxury Industrial"</div>
    <div class="sub" style="color:#C9A876">Mobile 375px · #121212 bg · copper accents · 48px touch targets</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <span class="pill" style="background:#1A1A1A;border:1px solid #2A2A2A;color:#F5F5F5">Surface</span>
      <span class="pill" style="background:linear-gradient(90deg,#C9A46A,#8C6D3F);color:white">Bronze CTA</span>
      <span class="pill" style="background:#1A1A1A;border:1px solid #C9A876;color:#C9A876">Copper text</span>
    </div>
  </div>
</body>
</html>
