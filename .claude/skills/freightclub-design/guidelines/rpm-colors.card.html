<!-- @dsCard group="Colors" viewport="700x120" name="RPM Profitability Bands" subtitle="Color-coded revenue-per-mile tiers shown on load cards" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--color-canvas); font-family: var(--font-body); padding: 16px; }
  .row { display: flex; gap: 12px; align-items: stretch; }
  .band { flex: 1; padding: 12px 16px; border-radius: 8px; display: flex; flex-direction: column; gap: 4px; }
  .rpm { font-size: 22px; font-weight: 900; }
  .desc { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.8; }
  .rule { font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
<div class="row">
  <div class="band" style="background:rgba(34,197,94,0.12);border:1px solid #22C55E">
    <div class="rpm" style="color:#15803D">$2.45/mi</div>
    <div class="desc" style="color:#15803D">● High — Profitable</div>
    <div class="rule" style="color:#15803D">≥ min RPM × 1.2</div>
  </div>
  <div class="band" style="background:rgba(245,158,11,0.12);border:1px solid #F59E0B">
    <div class="rpm" style="color:#B45309">$1.85/mi</div>
    <div class="desc" style="color:#B45309">◐ Neutral — Marginal</div>
    <div class="rule" style="color:#B45309">within 20% of min RPM</div>
  </div>
  <div class="band" style="background:rgba(239,68,68,0.12);border:1px solid #EF4444">
    <div class="rpm" style="color:#B91C1C">$0.87/mi</div>
    <div class="desc" style="color:#B91C1C">○ Low — Unprofitable</div>
    <div class="rule" style="color:#B91C1C">below min RPM</div>
  </div>
</div>
</body>
</html>
