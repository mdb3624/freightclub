<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="8px grid — xs:4 · sm:8 · md:16 · lg:24 · xl:32" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--color-canvas); font-family: var(--font-body); padding: 20px; }
  .grid { display: flex; gap: 16px; align-items: flex-end; }
  .token { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
  .bar { background: linear-gradient(180deg, #C9A46A, #B08D57); border-radius: 3px; width: 100%; }
  .name { font-size: 11px; font-weight: 700; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.06em; }
  .val  { font-size: 18px; font-weight: 900; color: var(--color-text-primary); font-family: var(--font-display); }
  .var  { font-size: 10px; color: var(--color-text-tertiary); font-family: monospace; }
</style>
</head>
<body>
<div class="grid">
  <div class="token"><div class="name">XS</div><div class="val">4px</div><div class="bar" style="height:4px"></div><div class="var">--space-xs</div></div>
  <div class="token"><div class="name">SM</div><div class="val">8px</div><div class="bar" style="height:8px"></div><div class="var">--space-sm</div></div>
  <div class="token"><div class="name">MD</div><div class="val">16px</div><div class="bar" style="height:16px"></div><div class="var">--space-md</div></div>
  <div class="token"><div class="name">LG</div><div class="val">24px</div><div class="bar" style="height:24px"></div><div class="var">--space-lg</div></div>
  <div class="token"><div class="name">XL</div><div class="val">32px</div><div class="bar" style="height:32px"></div><div class="var">--space-xl</div></div>
</div>
</body>
</html>
