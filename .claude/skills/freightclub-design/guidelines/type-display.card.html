<!-- @dsCard group="Type" viewport="700x220" name="Display Type — Sora" subtitle="Headings, KPIs, panel titles — Sora typeface" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--color-canvas); font-family: var(--font-display); padding: 16px 20px; display: flex; flex-direction: column; gap: 8px; }
  .row { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--color-border-secondary); padding-bottom: 6px; }
  .specimen { color: var(--color-text-primary); }
  .meta { font-size: 11px; color: var(--color-text-tertiary); font-family: monospace; white-space: nowrap; min-width: 120px; }
</style>
</head>
<body>
  <div class="row">
    <span class="meta">56px · 900 · Sora</span>
    <span class="specimen" style="font-size:56px;font-weight:900;line-height:1">24</span>
  </div>
  <div class="row">
    <span class="meta">40px · 700 · Sora</span>
    <span class="specimen" style="font-size:40px;font-weight:700;line-height:1">$16.3B Revenue</span>
  </div>
  <div class="row">
    <span class="meta">24px · 700 · Sora</span>
    <span class="specimen" style="font-size:24px;font-weight:700">SHIPMENT STATUS</span>
  </div>
  <div class="row">
    <span class="meta">18px · 600 · Sora</span>
    <span class="specimen" style="font-size:18px;font-weight:600">Load Board — Available Freight</span>
  </div>
  <div class="row" style="border-bottom:none">
    <span class="meta">16px · 600 · Sora</span>
    <span class="specimen" style="font-size:16px;font-weight:600">Active Loads • Quick Actions • My Stats</span>
  </div>
</body>
</html>
