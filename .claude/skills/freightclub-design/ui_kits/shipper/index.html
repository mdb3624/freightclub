<!-- @dsCard group="Shipper" viewport="1280x720" name="Shipper Dashboard" subtitle="Classic Cream & Metallic Bronze — desktop load management" -->
<!-- @startingPoint section="Shipper" subtitle="Shipper dashboard with KPIs, load table, and context-sensitive action zone" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreightClub — Shipper Dashboard</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--color-canvas);font-family:var(--font-body);color:var(--color-text-primary);min-height:100vh}
  /* PRIMARY — bronze gradient, tactile 3D shadow */
  .btn-primary{background:linear-gradient(180deg,#C9A46A 0%,#B08D57 45%,#8C6D3F 100%);box-shadow:inset 0 1px 2px rgba(255,255,255,.28),inset 0 -1px 2px rgba(0,0,0,.22),0 2px 5px rgba(0,0,0,.35);border:1px solid #7A5F3A;color:#fff;font-family:var(--font-body);font-weight:700;cursor:pointer;border-radius:4px;transition:all 150ms}
  .btn-primary:hover{opacity:.92}
  .btn-primary:active{opacity:.8;box-shadow:inset 0 2px 5px rgba(0,0,0,.28);transform:translateY(1px)}
  /* SECONDARY — warm cream gradient + bronze border + 3D lift */
  .btn-secondary{background:linear-gradient(180deg,#FAF6EE 0%,#F0E9D8 100%);border:1px solid #C9A876;color:#7A5F3A;font-family:var(--font-body);font-weight:600;cursor:pointer;border-radius:4px;transition:all 150ms;box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.15)}
  .btn-secondary:hover{background:linear-gradient(180deg,#F5EDD8 0%,#E8D9BB 100%);border-color:#B08D57;color:#5C4A2A}
  .btn-secondary:active{background:#DDD0B0;box-shadow:inset 0 2px 4px rgba(0,0,0,.15);transform:translateY(1px)}
  /* DESTRUCTIVE — red tinted + 3D lift */
  .btn-danger{background:linear-gradient(180deg,#FEF0EE 0%,#FEE2E2 100%);border:1px solid #E74C3C;color:#B91C1C;font-family:var(--font-body);font-weight:600;cursor:pointer;border-radius:4px;transition:all 150ms;box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 1px 3px rgba(231,76,60,.2)}
  .btn-danger:hover{background:linear-gradient(180deg,#FEE2E2 0%,#FECACA 100%);border-color:#C0392B}
  .btn-danger:active{transform:translateY(1px)}
  /* Table */
  table{width:100%;border-collapse:collapse}
  thead th{padding:10px 16px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#636E72;background:#F5F0E8;border-bottom:1px solid #E8E3D8;white-space:nowrap}
  tbody tr{border-bottom:1px solid #E8E3D8;cursor:pointer;transition:background 100ms}
  tbody tr:hover{background:#F5F0E8}
  tbody tr.selected{background:#FBF5E8;border-left:3px solid #B08D57}
  tbody tr.selected td:first-child{padding-left:13px}
  tbody td{padding:10px 16px;font-size:14px;height:48px;vertical-align:middle}
  /* Panel */
  .panel{background:#fff;border:1px solid #D0D0D0;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
  /* Action Zone container */
  .az-container{background:#FAF6EE;border:1px solid #C9A876;border-radius:10px;box-shadow:0 2px 8px rgba(176,141,87,.12),inset 0 1px 0 rgba(255,255,255,.9);overflow:hidden}
  .az-header{background:linear-gradient(180deg,#EFE5CC 0%,#E8D9BB 100%);border-bottom:1px solid #C9A876;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
  .az-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9C8060;margin-bottom:10px}
  .az-divider{border:none;border-top:1px dashed #C9A876;margin:14px 0}
  /* Forms */
  input,select{height:36px;padding:6px 10px;border:1px solid #D0D0D0;border-radius:4px;font-size:13px;font-family:var(--font-body);background:#fff;outline:none}
  input:focus,select:focus{border:2px solid #B08D57;box-shadow:0 0 0 3px rgba(176,141,87,.1)}
  label{display:block;font-size:11px;font-weight:600;color:#9C8060;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
  /* Row arrow affordance */
  .row-arrow{color:#D0D0D0;font-size:14px;transition:color 150ms,transform 150ms;display:block;text-align:center}
  tbody tr:hover .row-arrow,tbody tr.selected .row-arrow{color:#B08D57;transform:translateX(2px)}
  /* Alert badge */
  .alert-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:9999px;background:#FEE2E2;border:1px solid #E74C3C;color:#B91C1C;font-size:11px;font-weight:700}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── Design-system components (inlined) ───────────────────────── */
function StatusBadge({ status }) {
  const CFG = {
    DRAFT:      { bg:'#F1F5F9', color:'#475569', border:'#CBD5E1', icon:'✎', label:'Draft' },
    OPEN:       { bg:'#DBEAFE', color:'#1D4ED8', border:'#3498DB', icon:'●', label:'Open' },
    CLAIMED:    { bg:'#FEF3C7', color:'#B45309', border:'#F39C12', icon:'⚑', label:'Claimed' },
    IN_TRANSIT: { bg:'#EDE9FE', color:'#6D28D9', border:'#7C3AED', icon:'▶', label:'In Transit' },
    DELIVERED:  { bg:'#DCFCE7', color:'#15803D', border:'#27AE60', icon:'✓', label:'Delivered' },
    SETTLED:    { bg:'#CCFBF1', color:'#0F766E', border:'#14B8A6', icon:'★', label:'Settled' },
    CANCELLED:  { bg:'#FEE2E2', color:'#B91C1C', border:'#E74C3C', icon:'✕', label:'Cancelled' },
  };
  const c = CFG[status] || CFG.DRAFT;
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'2px 8px', borderRadius:9999, background:c.bg, border:`1px solid ${c.border}`, color:c.color, fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.05em', whiteSpace:'nowrap' }}><span aria-hidden="true" style={{fontSize:9}}>{c.icon}</span>{c.label}</span>;
}

function Avatar({ firstName='', lastName='', size='md', persona='shipper' }) {
  const initials = `${firstName[0]||''}${lastName[0]||''}`.toUpperCase() || '?';
  const sz = {sm:{w:28,h:28,f:10}, md:{w:36,h:36,f:13}, lg:{w:44,h:44,f:15}}[size]||{w:36,h:36,f:13};
  const st = persona==='carrier'
    ? {background:'#B08D57',color:'#121212'}
    : {background:'#fff',color:'#1A1A1A',border:'2px solid #B08D57',boxShadow:'0 0 0 2px #B08D57,0 2px 6px rgba(176,141,87,.4)'};
  return <div style={{ width:sz.w, height:sz.h, borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:sz.f, flexShrink:0, userSelect:'none', ...st }}>{initials}</div>;
}

function Stars({ n, rating }) {
  return <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
    <span>{[1,2,3,4,5].map(i=><span key={i} style={{color:i<=n?'#F59E0B':'#E8E3D8',fontSize:12}} aria-hidden="true">★</span>)}</span>
    {rating!=null && <span style={{fontSize:12,color:'#636E72',fontWeight:500}}>{rating.toFixed(1)}</span>}
  </span>;
}

function ProgressBar({ pct, status }) {
  const cancelled = status==='CANCELLED';
  const done = status==='DELIVERED'||status==='SETTLED';
  return <div style={{display:'flex',alignItems:'center',gap:6}}>
    <div style={{width:72,height:7,background:'#E8E3D8',borderRadius:9999,overflow:'hidden',flexShrink:0}}>
      <div style={{width:`${pct}%`,height:'100%',background:cancelled?'#D0D0D0':done?'#27AE60':'linear-gradient(90deg,#C9A46A,#B08D57)',borderRadius:9999}} />
    </div>
    <span style={{fontSize:11,color:cancelled?'#D0D0D0':'#636E72',fontWeight:500,minWidth:28}}>{cancelled?'—':`${pct}%`}</span>
  </div>;
}

/* ── Data ──────────────────────────────────────────────────────── */
const LOADS = [
  { id:'3011', origin:'Phoenix',  originState:'AZ', dest:'Houston',  destState:'TX', status:'CANCELLED',  progress:0,   equipment:'Flatbed',   equipType:'FLATBED',  stars:4, rating:4.1, hasAlert:true },
  { id:'3012', origin:'Austin',   originState:'TX', dest:'Dallas',   destState:'TX', status:'CLAIMED',    progress:35,  equipment:'Box Truck', equipType:'BOX_TRUCK',stars:4, rating:3.9, hasAlert:false },
  { id:'3013', origin:'Chicago',  originState:'IL', dest:'Miami',    destState:'FL', status:'IN_TRANSIT', progress:55,  equipment:'Box Truck', equipType:'BOX_TRUCK',stars:3, rating:3.2, hasAlert:false },
  { id:'3014', origin:'Memphis',  originState:'TN', dest:'Chicago',  destState:'IL', status:'DELIVERED',  progress:100, equipment:'Box Truck', equipType:'BOX_TRUCK',stars:4, rating:4.3, hasAlert:false },
  { id:'3015', origin:'Denver',   originState:'CO', dest:'Phoenix',  destState:'AZ', status:'DELIVERED',  progress:100, equipment:'Box Truck', equipType:'BOX_TRUCK',stars:5, rating:4.9, hasAlert:false },
  { id:'3016', origin:'Portland', originState:'OR', dest:'Seattle',  destState:'WA', status:'DELIVERED',  progress:100, equipment:'Box Truck', equipType:'BOX_TRUCK',stars:4, rating:4.2, hasAlert:false },
];

const CARRIERS = [
  { name:'James Morrison', eq:'Dry Van',  stars:4, rating:4.1, onTime:'98%', loads:47 },
  { name:'Dohn Boroe',     eq:'Flatbed',  stars:3, rating:3.2, onTime:'91%', loads:12 },
  { name:'Maria Reyes',    eq:'Box Truck',stars:5, rating:4.9, onTime:'100%',loads:89 },
];

/* ── Header ────────────────────────────────────────────────────── */
function Header() {
  const [menuOpen, setMenuOpen] = useState(false);
  return (
    <header style={{background:'#fff',borderBottom:'1px solid #D8CEB8',padding:'0 24px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:30,boxShadow:'0 1px 3px rgba(0,0,0,.05)'}}>
      <img src="../../assets/logo.png" style={{height:40,width:'auto'}} alt="FreightClub — MDB Integrated Logistics" />
      <nav style={{display:'flex',alignItems:'center',gap:8}}>
        <span style={{fontSize:12,color:'#9CA3AF',marginRight:4}}>Updated 2 min ago</span>
        <button aria-label="3 unread notifications" title="Notifications" style={{width:36,height:36,background:'transparent',border:'1px solid #E8E3D8',borderRadius:6,cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',position:'relative',color:'#636E72'}}>
          🔔
          <span aria-hidden="true" style={{position:'absolute',top:3,right:3,width:16,height:16,background:'#E74C3C',borderRadius:'50%',fontSize:9,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>3</span>
        </button>
        <div style={{position:'relative'}}>
          <button aria-label="Profile menu for James Porter" aria-haspopup="true" onClick={()=>setMenuOpen(o=>!o)} style={{background:'none',border:'none',cursor:'pointer',padding:0}}>
            <Avatar firstName="James" lastName="Porter" size="md" persona="shipper" />
          </button>
          {menuOpen && (
            <div role="menu" style={{position:'absolute',right:0,top:'calc(100% + 8px)',background:'#fff',border:'1px solid #D0D0D0',borderRadius:8,boxShadow:'0 4px 12px rgba(0,0,0,.1)',width:180,zIndex:50,overflow:'hidden'}}>
              <div style={{padding:'10px 14px',borderBottom:'1px solid #E8E3D8'}}>
                <div style={{fontSize:13,fontWeight:600}}>James Porter</div>
                <div style={{fontSize:12,color:'#636E72'}}>j.porter@acme.com</div>
              </div>
              {['Profile & Settings','Sign Out'].map(label=>(
                <button key={label} role="menuitem" style={{display:'block',width:'100%',padding:'9px 14px',border:'none',background:'transparent',textAlign:'left',fontSize:13,color:'#1A1A1A',cursor:'pointer',fontFamily:'inherit'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#F8F9FB'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>{label}</button>
              ))}
            </div>
          )}
        </div>
      </nav>
    </header>
  );
}

/* ── KPI Cards ─────────────────────────────────────────────────── */
function KPICards() {
  return (
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,marginBottom:24}}>
      <div className="panel" style={{padding:24}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#636E72',marginBottom:12}}>ACTIVE SHIPMENTS</div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:48,fontWeight:900,lineHeight:1,color:'#1A1A1A'}}>24</div>
        <div style={{display:'flex',gap:10,marginTop:10,flexWrap:'wrap'}}>
          {[['#E74C3C','#B91C1C','3 Delayed'],['#7C3AED','#6D28D9','12 In Transit'],['#F39C12','#B45309','9 Claimed']].map(([dot,text,label])=>(
            <span key={label} style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:12,color:text}}>
              <span style={{width:7,height:7,borderRadius:'50%',background:dot,display:'inline-block'}}></span>{label}
            </span>
          ))}
        </div>
      </div>
      <div className="panel" style={{padding:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#636E72'}}>EST. COST / MILE</div>
          <span style={{fontSize:11,fontWeight:700,color:'#B45309',background:'#FEF3C7',border:'1px solid #F39C12',borderRadius:4,padding:'1px 6px'}}>↑ +$0.02</span>
        </div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:48,fontWeight:900,lineHeight:1,color:'#1A1A1A'}}>$2.11</div>
        <div style={{marginTop:10,height:28,display:'flex',alignItems:'flex-end',gap:3}} aria-hidden="true">
          {[2.10,2.09,2.11,2.10,2.12,2.11,2.13].map((v,i)=>(
            <div key={i} style={{flex:1,height:Math.round((v-2.08)*160)+6,background:i===6?'#E74C3C':'linear-gradient(180deg,#C9A46A,#B08D57)',borderRadius:2,opacity:i===6?1:0.6+(i*0.06)}} />
          ))}
        </div>
        <div style={{fontSize:11,color:'#9CA3AF',marginTop:4}}>7-day · diesel benchmark</div>
      </div>
      <div className="panel" style={{padding:24}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'#636E72',marginBottom:12}}>ON-TIME DELIVERY RATE</div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:48,fontWeight:900,lineHeight:1,color:'#27AE60'}}>96%</div>
        <div style={{marginTop:10}}>
          <div style={{height:6,background:'#E8E3D8',borderRadius:9999,overflow:'hidden',marginBottom:6}}>
            <div style={{width:'96%',height:'100%',background:'#27AE60',borderRadius:9999}} />
          </div>
          <div style={{fontSize:12,color:'#636E72'}}>Based on 24 deliveries · last 30 days</div>
        </div>
      </div>
    </div>
  );
}

/* ── Shipment Table ─────────────────────────────────────────────── */
function ShipmentTable({ selected, onSelect }) {
  const [query, setQuery] = useState('');
  const filtered = LOADS.filter(l =>
    l.id.includes(query) || l.dest.toLowerCase().includes(query.toLowerCase()) || l.origin.toLowerCase().includes(query.toLowerCase())
  );

  return (
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',alignItems:'baseline',gap:10}}>
          <h2 style={{fontFamily:'Sora,sans-serif',fontSize:20,fontWeight:700}}>Shipment Status</h2>
          <span style={{fontSize:12,color:'#9CA3AF'}}>{filtered.length} loads</span>
          {selected && <span style={{fontSize:12,color:'#B08D57',fontWeight:600}}>· #{selected.id} selected</span>}
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <div style={{position:'relative'}}>
            <span style={{position:'absolute',left:9,top:'50%',transform:'translateY(-50%)',color:'#9CA3AF',fontSize:13,pointerEvents:'none'}}>⌕</span>
            <input type="search" placeholder="Search loads…" value={query} onChange={e=>setQuery(e.target.value)} style={{paddingLeft:28,width:190}} aria-label="Search loads" />
          </div>
          <button className="btn-secondary" style={{padding:'7px 13px',fontSize:12}}>Track on Map</button>
        </div>
      </div>

      <div className="panel" style={{overflow:'hidden',padding:0}}>
        <table>
          <thead><tr>
            <th scope="col">Load</th>
            <th scope="col">Route</th>
            <th scope="col">Status</th>
            <th scope="col">Transit</th>
            <th scope="col">Equipment</th>
            <th scope="col">Carrier Rating</th>
            <th scope="col">Action</th>
            <th scope="col" style={{width:20}}></th>
          </tr></thead>
          <tbody>
            {filtered.length === 0 && (
              <tr><td colSpan={8} style={{textAlign:'center',padding:32,color:'#9CA3AF',fontSize:14}}>No loads match your search.</td></tr>
            )}
            {filtered.map(l => (
              <tr
                key={l.id}
                className={selected?.id===l.id ? 'selected' : ''}
                onClick={() => onSelect(selected?.id===l.id ? null : l)}
                aria-selected={selected?.id===l.id}
                aria-label={`Load ${l.id}, ${l.origin} to ${l.dest}, ${l.status.replace('_',' ')}`}
              >
                <td style={{fontWeight:600,fontSize:13,whiteSpace:'nowrap'}}>#{l.id}</td>
                <td>
                  <div style={{fontSize:13,fontWeight:500}}>{l.origin}</div>
                  <div style={{fontSize:12,color:'#9CA3AF'}}>→ {l.dest}</div>
                </td>
                <td><StatusBadge status={l.status} /></td>
                <td><ProgressBar pct={l.progress} status={l.status} /></td>
                <td style={{color:'#636E72',fontSize:13}}>{l.equipment}</td>
                <td><Stars n={l.stars} rating={l.rating} /></td>
                <td>
                  {l.hasAlert ? (
                    <span className="alert-badge" role="alert">⚠ Issue</span>
                  ) : l.status==='DELIVERED'||l.status==='SETTLED' ? (
                    <button className="btn-secondary" style={{padding:'4px 10px',fontSize:12}} onClick={e=>e.stopPropagation()}>View POD</button>
                  ) : l.status==='CANCELLED' ? (
                    <span style={{fontSize:12,color:'#D0D0D0'}}>—</span>
                  ) : (
                    <button className="btn-secondary" style={{padding:'4px 10px',fontSize:12}} onClick={e=>e.stopPropagation()}>View BOL</button>
                  )}
                </td>
                <td><span className="row-arrow" aria-hidden="true">{selected?.id===l.id ? '✕' : '›'}</span></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── Context Panel (Action Zone) ───────────────────────────────── */
function ContextPanel({ selected, onDeselect }) {
  const [confirming, setConfirming] = useState(false);
  const [origin, setOrigin] = useState('');
  const [dest, setDest] = useState('');
  const [equip, setEquip] = useState('');

  // When a load is selected, pre-populate carrier search with its route
  React.useEffect(() => {
    if (selected) {
      setOrigin(selected.originState);
      setDest(selected.destState);
      setEquip(selected.equipType);
      setConfirming(false);
    } else {
      setOrigin(''); setDest(''); setEquip('');
    }
  }, [selected?.id]);

  const isOpen = selected && selected.status !== 'CANCELLED' && selected.status !== 'SETTLED';

  return (
    <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* Zone container */}
      <div className="az-container">

        {/* Header — changes label when load is selected */}
        <div className="az-header">
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:14}}>{selected ? '📦' : '⚡'}</span>
            <span style={{fontFamily:'Sora,sans-serif',fontSize:14,fontWeight:700,color:'#5C4A2A',letterSpacing:'.02em'}}>
              {selected ? `LOAD #${selected.id}` : 'ACTION ZONE'}
            </span>
          </div>
          {selected ? (
            <button onClick={onDeselect} aria-label="Clear selection" style={{background:'none',border:'none',cursor:'pointer',fontSize:13,color:'#9C8060',fontFamily:'inherit',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
              ✕ <span>Clear</span>
            </button>
          ) : (
            <span style={{fontSize:11,color:'#9C8060'}}>Quick access</span>
          )}
        </div>

        <div style={{padding:16,display:'flex',flexDirection:'column',gap:0}}>

          {/* ── LOAD-SELECTED STATE ── */}
          {selected ? (<>
            {/* Load summary */}
            <div style={{background:'#fff',border:'1px solid #E8E3D8',borderRadius:8,padding:14,marginBottom:14}}>
              <div style={{fontFamily:'Sora,sans-serif',fontSize:15,fontWeight:700,color:'#1A1A1A',marginBottom:6}}>
                {selected.origin} → {selected.dest}
              </div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:8}}>
                <StatusBadge status={selected.status} />
                <span style={{fontSize:12,color:'#636E72',display:'flex',alignItems:'center'}}>{selected.equipment}</span>
              </div>
              <ProgressBar pct={selected.progress} status={selected.status} />
              {selected.hasAlert && (
                <div role="alert" style={{marginTop:10,background:'#FEE2E2',border:'1px solid #E74C3C',borderRadius:6,padding:'8px 12px',fontSize:12,color:'#B91C1C',display:'flex',gap:6,alignItems:'flex-start'}}>
                  <span>⚠</span><span><strong>Issue reported</strong> — carrier flagged a pickup problem.</span>
                </div>
              )}
              {/* Load actions */}
              {!confirming ? (
                <div style={{display:'flex',gap:8,marginTop:12}}>
                  <button className="btn-primary" style={{flex:2,padding:'8px 0',fontSize:13}}>View Documents</button>
                  {isOpen && <button className="btn-danger" style={{flex:1,padding:'8px 0',fontSize:12}} onClick={()=>setConfirming(true)}>Cancel</button>}
                </div>
              ) : (
                <div style={{marginTop:10,background:'#FEE2E2',border:'1px solid #E74C3C',borderRadius:6,padding:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:'#B91C1C',marginBottom:4}}>Cancel Load #{selected.id}?</div>
                  <div style={{fontSize:12,color:'#B91C1C',marginBottom:10}}>This cannot be undone.</div>
                  <div style={{display:'flex',gap:8}}>
                    <button className="btn-danger" style={{flex:1,padding:'7px 0',fontSize:12,background:'#E74C3C',color:'#fff',border:'none'}}>Yes, Cancel</button>
                    <button className="btn-secondary" style={{flex:1,padding:'7px 0',fontSize:12}} onClick={()=>setConfirming(false)}>Keep Load</button>
                  </div>
                </div>
              )}
            </div>

            <hr className="az-divider" />

            {/* Navigate to full carrier search pre-filled with this load's route */}
            <button className="btn-secondary" style={{width:'100%',padding:'9px 0',fontSize:13,marginBottom:14}} onClick={()=>{
              const p=new URLSearchParams();
              if(selected.originState) p.set('origin',selected.originState);
              if(selected.destState)   p.set('dest',selected.destState);
              if(selected.equipType)   p.set('equip',selected.equipType);
              window.location.href='carrier-network.html?'+p.toString();
            }}>Find Carriers for This Load →</button>

            <hr className="az-divider" />

            {/* Preferred carriers — assign shortlist */}
            <div>
              <div className="az-section-label">PREFERRED CARRIERS</div>
              {CARRIERS.map(c=>(
                <div key={c.name} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid #E8E3D8'}}>
                  <Avatar firstName={c.name.split(' ')[0]} lastName={c.name.split(' ')[1]} size="sm" />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#1A1A1A',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
                    <div style={{fontSize:11,color:'#636E72'}}>{c.eq} · {c.onTime} on-time</div>
                  </div>
                  <button className="btn-primary" style={{padding:'5px 10px',fontSize:11,whiteSpace:'nowrap',flexShrink:0}}>Assign</button>
                </div>
              ))}
            </div>

          </>) : (<>
          {/* ── DEFAULT STATE: Action Zone ── */}
            <div className="az-section-label">QUICK ACTIONS</div>
            <button className="btn-primary" style={{padding:'11px 16px',width:'100%',textAlign:'center',fontSize:14,marginBottom:8}} aria-label="Create a new freight load" onClick={()=>window.location.href='create-load.html'}>
              + Create New Load
            </button>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:0}}>
              {[['Get a Quote','#'],['Find Carriers','carrier-network.html'],['My Documents','#'],['Payments','#']].map(([label,href])=>(
                <button key={label} className="btn-secondary" style={{padding:'8px 10px',fontSize:12,textAlign:'center'}} onClick={()=>href!=='#'&&(window.location.href=href)}>{label}</button>
              ))}
            </div>

            <hr className="az-divider" />

            {/* Preferred carriers — list with remove only */}
            <div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div className="az-section-label" style={{margin:0}}>PREFERRED CARRIERS</div>
                <a href="carrier-network.html" style={{fontSize:12,color:'#B08D57',fontWeight:600,textDecoration:'none'}}>Manage →</a>
              </div>
              {CARRIERS.map(c=>(
                <div key={c.name} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',borderBottom:'1px solid #E8E3D8'}}>
                  <Avatar firstName={c.name.split(' ')[0]} lastName={c.name.split(' ')[1]} size="sm" />
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#1A1A1A',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{c.name}</div>
                    <div style={{fontSize:11,color:'#636E72'}}>{c.eq} · {c.onTime} on-time</div>
                  </div>
                  <button title={`Remove ${c.name} from preferred`} aria-label={`Remove ${c.name}`} style={{background:'none',border:'1px solid #E8E3D8',borderRadius:4,width:28,height:28,cursor:'pointer',color:'#9CA3AF',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 150ms'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='#E74C3C';e.currentTarget.style.color='#B91C1C'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='#E8E3D8';e.currentTarget.style.color='#9CA3AF'}}>×</button>
                </div>
              ))}
            </div>
          </>)}

        </div>
      </div>
    </div>
  );
}

/* ── App ────────────────────────────────────────────────────────── */
function App() {
  const [selected, setSelected] = useState(null);

  React.useEffect(() => {
    const handler = e => { if (e.key==='Escape') setSelected(null); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);

  return (
    <>
      <Header />
      <main style={{maxWidth:1400,margin:'0 auto',padding:'24px'}}>
        <KPICards />
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:24,alignItems:'start'}}>
          <ShipmentTable selected={selected} onSelect={setSelected} />
          <ContextPanel selected={selected} onDeselect={()=>setSelected(null)} />
        </div>
      </main>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
