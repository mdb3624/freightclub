name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Start PostgreSQL and create test database
        run: |
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER freightclub_runtime WITH PASSWORD 'freightclub' SUPERUSER;"
          sudo -u postgres psql -c "CREATE DATABASE freightclub_test OWNER freightclub_runtime;"

      - name: Run tests
        working-directory: backend
        run: mvn test

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

  frontend:
    name: Frontend — Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build

  e2e:
    name: E2E Tests — Playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: freightclub_runtime
          POSTGRES_PASSWORD: freightclub
          POSTGRES_DB: freightclub_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Start backend
        working-directory: backend
        run: |
          java -jar target/*.jar &
          sleep 10
          curl -f http://localhost:9091/actuator/health || exit 1
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/freightclub_test
          SPRING_DATASOURCE_USERNAME: freightclub_runtime
          SPRING_DATASOURCE_PASSWORD: freightclub

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Start frontend dev server
        working-directory: frontend
        run: npm run dev &
        env:
          VITE_API_URL: http://localhost:9091

      - name: Wait for frontend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:9090 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 1
          done
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:9090
          TEST_BACKEND_URL: http://localhost:9091

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      - name: Upload trace files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/test-results/trace-*.zip
          retention-days: 30
