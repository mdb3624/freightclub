<!-- @dsCard group="Colors" viewport="700x140" name="Carrier Palette" subtitle="Luxury Industrial dark mode — owner-operator mobile persona" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: #121212; font-family: var(--font-body); padding: 16px; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { border-radius: 6px; overflow: hidden; flex: 1; min-width: 80px; border: 1px solid #2A2A2A; }
  .color { height: 56px; }
  .info { padding: 6px 8px; background: #1A1A1A; }
  .name { font-size: 11px; font-weight: 600; color: #F5F5F5; }
  .hex  { font-size: 10px; color: #C9A876; font-family: monospace; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="color" style="background:#121212"></div><div class="info"><div class="name">Carrier BG</div><div class="hex">#121212</div></div></div>
  <div class="swatch"><div class="color" style="background:#1A1A1A"></div><div class="info"><div class="name">Surface</div><div class="hex">#1A1A1A</div></div></div>
  <div class="swatch"><div class="color" style="background:#242424"></div><div class="info"><div class="name">Surface 2</div><div class="hex">#242424</div></div></div>
  <div class="swatch"><div class="color" style="background:#2A2A2A"></div><div class="info"><div class="name">Border</div><div class="hex">#2A2A2A</div></div></div>
  <div class="swatch"><div class="color" style="background:#F5F5F5"></div><div class="info"><div class="name">Text</div><div class="hex">#F5F5F5</div></div></div>
  <div class="swatch"><div class="color" style="background:#C9A876"></div><div class="info"><div class="name">Text Muted / Accent</div><div class="hex">#C9A876</div></div></div>
  <div class="swatch"><div class="color" style="background:#B08D57"></div><div class="info"><div class="name">Bronze Accent</div><div class="hex">#B08D57</div></div></div>
</div>
</body>
</html>
