<!-- @dsCard group="Colors" viewport="700x140" name="Shipper Palette" subtitle="Classic Cream & Metallic Bronze — shipper/admin persona" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--color-canvas); font-family: var(--font-body); padding: 16px; }
  .swatches { display: flex; gap: 8px; flex-wrap: wrap; }
  .swatch { border-radius: 6px; overflow: hidden; flex: 1; min-width: 80px; border: 1px solid rgba(0,0,0,0.08); }
  .color { height: 56px; }
  .info { padding: 6px 8px; background: white; }
  .name { font-size: 11px; font-weight: 600; color: #1A1A1A; }
  .hex  { font-size: 10px; color: #636E72; font-family: monospace; }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch"><div class="color" style="background:#EFEBE0"></div><div class="info"><div class="name">Canvas</div><div class="hex">#EFEBE0</div></div></div>
  <div class="swatch"><div class="color" style="background:#FFFFFF;border-bottom:1px solid #eee"></div><div class="info"><div class="name">Surface White</div><div class="hex">#FFFFFF</div></div></div>
  <div class="swatch"><div class="color" style="background:#F8F9FB"></div><div class="info"><div class="name">Surface Light</div><div class="hex">#F8F9FB</div></div></div>
  <div class="swatch"><div class="color" style="background:#1A1A1A"></div><div class="info"><div class="name">Text Primary</div><div class="hex">#1A1A1A</div></div></div>
  <div class="swatch"><div class="color" style="background:#4A5568"></div><div class="info"><div class="name">Text Secondary</div><div class="hex">#4A5568</div></div></div>
  <div class="swatch"><div class="color" style="background:#636E72"></div><div class="info"><div class="name">Text Tertiary</div><div class="hex">#636E72</div></div></div>
  <div class="swatch"><div class="color" style="background:#D0D0D0"></div><div class="info"><div class="name">Border</div><div class="hex">#D0D0D0</div></div></div>
  <div class="swatch"><div class="color" style="background:#E8E3D8"></div><div class="info"><div class="name">Divider</div><div class="hex">#E8E3D8</div></div></div>
</div>
</body>
</html>
