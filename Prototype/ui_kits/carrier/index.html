<!-- @dsCard group="Carrier" viewport="375x780" name="Carrier Dashboard" subtitle="Luxury Industrial dark mode — owner-operator mobile (375px)" -->
<!-- @startingPoint section="Carrier" subtitle="Carrier mobile dashboard — full load flow: board → detail → claim → pickup → delivery + POD" viewport="375x780" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FreightClub — Carrier Dashboard</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0a0a0a;font-family:var(--font-body);color:#F5F5F5;display:flex;justify-content:center;min-height:100vh}
  .phone{width:375px;height:100vh;background:#121212;display:flex;flex-direction:column;position:relative;overflow:hidden}
  /* Bronze button — primary action */
  .btn-b{background:linear-gradient(180deg,#C9A46A 0%,#B08D57 45%,#8C6D3F 100%);box-shadow:inset 0 1px 2px rgba(255,255,255,.28),inset 0 -1px 2px rgba(0,0,0,.22),0 2px 5px rgba(0,0,0,.35);border:1px solid #7A5F3A;color:#fff;font-family:var(--font-body);font-weight:700;cursor:pointer;border-radius:8px;font-size:14px;letter-spacing:.04em;transition:all 150ms;min-height:48px;display:flex;align-items:center;justify-content:center}
  .btn-b:hover{opacity:.92}
  .btn-b:active{opacity:.8;transform:translateY(1px)}
  /* Ghost button — secondary on dark */
  .btn-g{background:transparent;border:1px solid #3A3A3A;color:#C9A876;font-family:var(--font-body);font-weight:600;cursor:pointer;border-radius:8px;font-size:14px;transition:all 150ms;min-height:48px;display:flex;align-items:center;justify-content:center}
  .btn-g:hover{border-color:#C9A876}
  .btn-g:active{background:rgba(201,168,118,.08)}
  /* Danger */
  .btn-d{background:rgba(231,76,60,.15);border:1px solid #E74C3C;color:#E74C3C;font-family:var(--font-body);font-weight:600;cursor:pointer;border-radius:8px;font-size:14px;transition:all 150ms;min-height:48px;display:flex;align-items:center;justify-content:center}
  /* Tab bar */
  .tab-btn{flex:1;height:48px;background:transparent;border:none;color:#636E72;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-body);text-transform:uppercase;letter-spacing:.05em;border-top:2px solid transparent;transition:all 150ms;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .tab-btn.active{color:#F5F5F5;border-top-color:#B08D57}
  /* Cards */
  .card{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px}
  .card-tap{background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;cursor:pointer;transition:border-color 150ms,transform 80ms}
  .card-tap:active{border-color:#C9A876;transform:scale(.99)}
  /* Inputs on dark */
  .dark-input{height:44px;padding:0 12px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;color:#F5F5F5;font-size:13px;font-family:var(--font-body);outline:none;transition:border 150ms}
  .dark-input:focus{border-color:#C9A876}
  .dark-select{height:44px;padding:0 10px;background:#1A1A1A;border:1px solid #2A2A2A;border-radius:8px;color:#C9A876;font-size:12px;font-family:var(--font-body);outline:none;appearance:none}
  /* RPM badges */
  .rpm-g{background:rgba(34,197,94,.12);color:#22C55E;border:1px solid #22C55E;border-radius:9999px;padding:3px 10px;font-size:12px;font-weight:700}
  .rpm-y{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid #F59E0B;border-radius:9999px;padding:3px 10px;font-size:12px;font-weight:700}
  .rpm-r{background:rgba(239,68,68,.12);color:#EF4444;border:1px solid #EF4444;border-radius:9999px;padding:3px 10px;font-size:12px;font-weight:700}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .screen-enter{animation:fadeIn 180ms ease forwards}
  /* Scrollable content area */
  .scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  /* Section labels */
  .sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#636E72}
  /* Divider */
  .divider{height:1px;background:#2A2A2A;margin:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

/* ── Data ──────────────────────────────────────────────────────── */
// OO profile — single source of truth for equipment + identity
const OO_PROFILE = {
  firstName: 'Jake', lastName: 'Morrison',
  equipment: 'Dry Van', equipLabel: 'Dry Van 53ft',
  plate: 'TX-4821', dot: 'TX-4821',
  minRpm: 0.99,
};

const LOADS = [
  { id:'L-4512', origin:'Houston, TX', originSt:'TX', dest:'Dallas, TX', destSt:'TX', miles:265, rate:310, payType:'flat', rpm:1.17, equip:'Dry Van', pickup:'Jun 30, 9:00 AM', deliver:'Jun 30, 5:00 PM', weight:'42,000 lbs', shipper:'Acme Logistics', shipperPhone:'(512) 555-0182', shipperRating:4.2, notes:'Liftgate required at destination. Dock hours 7am–4pm.' },
  { id:'L-4513', origin:'Austin, TX',   originSt:'TX', dest:'San Antonio, TX', destSt:'TX', miles:80,  rate:280, payType:'flat', rpm:3.50, equip:'Flatbed', pickup:'Jul 1, 7:00 AM', deliver:'Jul 1, 12:00 PM', weight:'28,000 lbs', shipper:'Gulf Freight Co', shipperPhone:'(210) 555-0344', shipperRating:4.8, notes:'' },
  { id:'L-4514', origin:'Phoenix, AZ',  originSt:'AZ', dest:'Los Angeles, CA', destSt:'CA', miles:370, rate:800, payType:'flat', rpm:2.16, equip:'Reefer',  pickup:'Jul 2, 6:00 AM', deliver:'Jul 2, 8:00 PM', weight:'36,000 lbs', shipper:'Desert Cold Chain', shipperPhone:'(602) 555-0911', shipperRating:4.6, notes:'Temperature must stay at 34°F. Driver must check temp log at pickup.' },
  { id:'L-4515', origin:'Chicago, IL',  originSt:'IL', dest:'Detroit, MI',     destSt:'MI', miles:280, rate:420, payType:'flat', rpm:1.50, equip:'Dry Van', pickup:'Jul 3, 8:00 AM', deliver:'Jul 3, 6:00 PM', weight:'38,000 lbs', shipper:'Midwest Shippers', shipperPhone:'(312) 555-0772', shipperRating:3.9, notes:'' },
  { id:'L-4516', origin:'Miami, FL',    originSt:'FL', dest:'Atlanta, GA',     destSt:'GA', miles:660, rate:950, payType:'flat', rpm:1.44, equip:'Flatbed', pickup:'Jul 4, 7:00 AM', deliver:'Jul 5, 3:00 PM',  weight:'44,000 lbs', shipper:'Southern Freight', shipperPhone:'(305) 555-0215', shipperRating:4.1, notes:'Oversized permit required — provided by shipper.' },
];

const DIESEL = [
  {r:'East',$:3.82,d:+0.04},{r:'Midwest',$:3.71,d:-0.02},{r:'Gulf',$:3.61,d:+0.01},{r:'West',$:4.12,d:+0.07},
];

function rpmClass(r){ return r>=2.0?'rpm-g':r>=1.3?'rpm-y':'rpm-r'; }

/* ── Shared atoms ────────────────────────────────────────────────── */
function Avatar({ first='', last='' }) {
  const f = first || OO_PROFILE.firstName;
  const l = last  || OO_PROFILE.lastName;
  return <div style={{width:44,height:44,borderRadius:'50%',background:'#B08D57',color:'#121212',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:15,flexShrink:0,userSelect:'none'}}>{(f[0]||'')+(l[0]||'')}</div>;
}

function Stars({ n, rating }) {
  return <span style={{display:'inline-flex',alignItems:'center',gap:4}}>
    {[1,2,3,4,5].map(i=><span key={i} style={{color:i<=Math.round(n)?'#F59E0B':'#2A2A2A',fontSize:12}}aria-hidden="true">★</span>)}
    {rating!=null&&<span style={{fontSize:12,color:'#636E72'}}>{rating.toFixed(1)}</span>}
  </span>;
}

/* ── Header ──────────────────────────────────────────────────────── */
function Header({ onBack, title, notifCount=2 }) {
  return (
    <header style={{width:'100%',height:56,background:'#1A1A1A',borderBottom:'1px solid #2A2A2A',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 12px',flexShrink:0}}>
      {onBack ? (
        <button onClick={onBack} style={{width:44,height:44,background:'none',border:'none',color:'#C9A876',cursor:'pointer',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center'}} aria-label="Go back">‹</button>
      ) : (
        <img src="../../assets/logo-mobile.png" style={{height:34,width:'auto',objectFit:'contain'}} alt="MDB" />
      )}
      {title ? (
        <span style={{fontFamily:'Sora,sans-serif',fontSize:15,fontWeight:700,color:'#F5F5F5'}}>{title}</span>
      ) : (
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',background:'rgba(39,174,96,.12)',border:'1px solid #27AE60',borderRadius:12}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:'#27AE60',display:'inline-block'}}></span>
          <span style={{fontSize:11,fontWeight:700,color:'#27AE60'}}>11h HOS available</span>
        </div>
      )}
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <button aria-label={`${notifCount} notifications`} style={{width:44,height:44,background:'none',border:'none',color:'#F5F5F5',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',position:'relative',fontSize:18}}>
          🔔
          {notifCount>0&&<span aria-hidden="true" style={{position:'absolute',top:8,right:8,width:8,height:8,background:'#E74C3C',borderRadius:'50%'}}/>}
        </button>
        <Avatar first="Jake" last="Morrison" />
      </div>
    </header>
  );
}

/* ── Active Load Hero ────────────────────────────────────────────── */
function ActiveHero({ load, onViewDetails }) {
  if (!load) return null;
  return (
    <div style={{background:'#1A1A1A',padding:12,borderBottom:'1px solid #2A2A2A',flexShrink:0}}>
      <div className="sec-lbl" style={{marginBottom:8,color:'#C9A876'}}>YOUR ACTIVE LOAD</div>
      <div className="card" style={{padding:14,position:'relative'}}>
        <div style={{position:'absolute',top:10,right:10,background:'#27AE60',borderRadius:8,width:52,height:52,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:10,fontWeight:700,gap:1}}>
          <span style={{fontSize:16}}>✓</span>
          <span>118%</span>
        </div>
        <div style={{paddingRight:60}}>
          <div style={{fontFamily:'Sora,sans-serif',fontSize:15,fontWeight:700,marginBottom:2}}>{load.origin}</div>
          <div style={{fontSize:13,color:'#C9A876',marginBottom:6}}>→ {load.dest}</div>
          <div style={{display:'flex',gap:10,fontSize:12,color:'#808080'}}>
            <span>{load.miles} mi</span>
            <span>${load.rate} flat</span>
            <span className={rpmClass(load.rpm)}>${load.rpm.toFixed(2)}/mi</span>
          </div>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:10}}>
        <button className="btn-b" style={{fontSize:13}} onClick={()=>onViewDetails(load,'active')}>View My Load</button>
        <button className="btn-g" style={{fontSize:13}} onClick={()=>onViewDetails(load,'contact')}>Contact Shipper</button>
      </div>
    </div>
  );
}

/* ── Diesel Ticker ───────────────────────────────────────────────── */
function DieselTicker() {
  return (
    <div style={{background:'#161616',borderBottom:'1px solid #2A2A2A',padding:'8px 12px',display:'flex',gap:16,overflowX:'auto',flexShrink:0}}>
      <span className="sec-lbl" style={{flexShrink:0}}>DIESEL</span>
      {DIESEL.map(d=>(
        <span key={d.r} style={{display:'flex',alignItems:'center',gap:4,fontSize:12,flexShrink:0}}>
          <span style={{color:'#636E72'}}>{d.r}</span>
          <span style={{fontWeight:700,color:'#F5F5F5'}}>${d.$.toFixed(2)}</span>
          <span style={{fontSize:10,color:d.d>0?'#EF4444':'#22C55E'}}>{d.d>0?`↑`:`↓`}{Math.abs(d.d).toFixed(2)}</span>
        </span>
      ))}
    </div>
  );
}

/* ── Load Board ──────────────────────────────────────────────────── */
function LoadBoard({ onDetail }) {
  const [query, setQuery] = useState('');
  // Equipment is driven entirely from the OO profile — no user filter
  const filtered = LOADS.filter(l =>
    l.equip === OO_PROFILE.equipment &&
    (!query || l.originSt.toLowerCase().includes(query.toLowerCase()) || l.origin.toLowerCase().includes(query.toLowerCase()))
  );

  return (
    <div className="scroll-area" style={{padding:12}}>
      {/* Profile-driven equipment badge — not a filter */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10,padding:'8px 10px',background:'#161616',borderRadius:8,border:'1px solid #2A2A2A'}}>
        <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:'#636E72'}}>YOUR EQUIPMENT</span>
        <span style={{padding:'2px 10px',borderRadius:9999,background:'rgba(201,168,118,.1)',border:'1px solid #C9A876',color:'#C9A876',fontSize:12,fontWeight:700}}>{OO_PROFILE.equipLabel}</span>
        <span style={{fontSize:11,color:'#636E72',marginLeft:'auto'}}>Loads matched to your rig</span>
      </div>
      {/* Origin/destination filter only */}
      <div style={{marginBottom:10}}>
        <div style={{position:'relative'}}>
          <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'#636E72',fontSize:14,pointerEvents:'none'}}>⌕</span>
          <input className="dark-input" style={{width:'100%',paddingLeft:32}} placeholder="Filter by origin state or city…" value={query} onChange={e=>setQuery(e.target.value)} aria-label="Filter by origin" />
        </div>
      </div>

      <div className="sec-lbl" style={{marginBottom:8}}>{filtered.length} LOADS MATCHING YOUR RIG</div>

      {filtered.length===0 && (
        <div style={{textAlign:'center',padding:'32px 0',color:'#636E72',fontSize:13}}>No loads match your filters.</div>
      )}

      {filtered.map(l=>(
        <div key={l.id} className="card-tap" style={{padding:14,marginBottom:8}} onClick={()=>onDetail(l)} role="button" aria-label={`Load ${l.id}: ${l.origin} to ${l.dest}`}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div>
              <div style={{fontFamily:'Sora,sans-serif',fontSize:14,fontWeight:700,color:'#F5F5F5'}}>{l.origin}</div>
              <div style={{fontSize:12,color:'#C9A876',marginTop:2}}>→ {l.dest}</div>
            </div>
            <span className={rpmClass(l.rpm)}>${l.rpm.toFixed(2)}/mi</span>
          </div>
          <div className="divider" style={{marginBottom:8}} />
          <div style={{display:'flex',gap:12,fontSize:12,color:'#808080',flexWrap:'wrap'}}>
            <span>{l.miles} mi</span>
            <span>${l.rate} flat</span>
            <span>{l.equip}</span>
            <span>Pickup {l.pickup.split(',')[0]}</span>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ── Load Detail ─────────────────────────────────────────────────── */
function LoadDetail({ load, onClaim, onBack }) {
  const [confirming, setConfirming] = useState(false);
  return (
    <div className="scroll-area screen-enter" style={{paddingBottom:80}}>
      {/* Route hero */}
      <div style={{background:'#1A1A1A',padding:16,borderBottom:'1px solid #2A2A2A'}}>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:18,fontWeight:700,color:'#F5F5F5',marginBottom:4}}>{load.origin}</div>
        <div style={{fontSize:15,color:'#C9A876',marginBottom:12}}>→ {load.dest}</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <span className={rpmClass(load.rpm)} style={{fontSize:13}}>RPM ${load.rpm.toFixed(2)}/mi</span>
          <span style={{padding:'3px 10px',background:'rgba(201,168,118,.1)',border:'1px solid #3A3A3A',borderRadius:9999,fontSize:12,color:'#C9A876'}}>{load.equip}</span>
        </div>
      </div>

      {/* Stats grid */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:1,background:'#2A2A2A',borderBottom:'1px solid #2A2A2A'}}>
        {[['Distance',`${load.miles} mi`],['Pay',`$${load.rate}`],['Weight',load.weight]].map(([k,v])=>(
          <div key={k} style={{background:'#161616',padding:'12px 0',textAlign:'center'}}>
            <div style={{fontFamily:'Sora,sans-serif',fontSize:17,fontWeight:900,color:'#F5F5F5'}}>{v}</div>
            <div className="sec-lbl" style={{marginTop:3}}>{k}</div>
          </div>
        ))}
      </div>

      {/* Map placeholder */}
      <div style={{height:140,background:'#161616',borderBottom:'1px solid #2A2A2A',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:6}}>
        <div style={{fontSize:28}}>🗺</div>
        <div style={{fontSize:12,color:'#636E72'}}>Route map · {load.originSt} → {load.destSt}</div>
      </div>

      {/* Schedule */}
      <div style={{padding:'14px 16px',borderBottom:'1px solid #2A2A2A'}}>
        <div className="sec-lbl" style={{marginBottom:10}}>SCHEDULE</div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
            <span style={{color:'#636E72'}}>Pickup</span>
            <span style={{color:'#F5F5F5',fontWeight:600}}>{load.pickup}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:13}}>
            <span style={{color:'#636E72'}}>Deliver by</span>
            <span style={{color:'#F5F5F5',fontWeight:600}}>{load.deliver}</span>
          </div>
        </div>
      </div>

      {/* Shipper info */}
      <div style={{padding:'14px 16px',borderBottom:'1px solid #2A2A2A'}}>
        <div className="sec-lbl" style={{marginBottom:10}}>SHIPPER</div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div style={{width:40,height:40,borderRadius:8,background:'#2A2A2A',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🏢</div>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600,color:'#F5F5F5'}}>{load.shipper}</div>
            <Stars n={Math.round(load.shipperRating)} rating={load.shipperRating} />
          </div>
          <a href={`tel:${load.shipperPhone}`} style={{display:'flex',alignItems:'center',justifyContent:'center',width:44,height:44,background:'rgba(39,174,96,.12)',border:'1px solid #27AE60',borderRadius:8,fontSize:18,textDecoration:'none'}} aria-label={`Call ${load.shipper}`}>📞</a>
        </div>
      </div>

      {/* Special instructions */}
      {load.notes && (
        <div style={{padding:'14px 16px',borderBottom:'1px solid #2A2A2A',background:'rgba(245,158,11,.05)'}}>
          <div className="sec-lbl" style={{marginBottom:8,color:'#F59E0B'}}>SPECIAL INSTRUCTIONS</div>
          <div style={{fontSize:13,color:'#F5F5F5',lineHeight:1.6}}>{load.notes}</div>
        </div>
      )}

      {/* Profitability */}
      <div style={{padding:'14px 16px',borderBottom:'1px solid #2A2A2A'}}>
        <div className="sec-lbl" style={{marginBottom:10}}>PROFITABILITY</div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
          <span style={{color:'#636E72'}}>Gross pay</span>
          <span style={{color:'#F5F5F5',fontWeight:600}}>${load.rate}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,marginBottom:6}}>
          <span style={{color:'#636E72'}}>Est. fuel cost</span>
          <span style={{color:'#EF4444'}}>-${Math.round(load.miles*0.18*4.0)}</span>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:13,paddingTop:8,borderTop:'1px solid #2A2A2A'}}>
          <span style={{color:'#C9A876',fontWeight:700}}>Est. net</span>
          <span style={{color:'#27AE60',fontWeight:900,fontFamily:'Sora,sans-serif',fontSize:16}}>${load.rate - Math.round(load.miles*0.18*4.0)}</span>
        </div>
      </div>

      {/* Claim CTA — fixed bottom */}
      <div style={{padding:16}}>
        {!confirming ? (
          <button className="btn-b" style={{width:'100%',fontSize:15,height:56}} onClick={()=>setConfirming(true)}>
            Claim This Load
          </button>
        ) : (
          <div style={{background:'rgba(176,141,87,.08)',border:'1px solid #C9A876',borderRadius:10,padding:16}}>
            <div style={{fontSize:14,fontWeight:700,color:'#F5F5F5',marginBottom:6}}>Confirm claim?</div>
            <div style={{fontSize:13,color:'#808080',marginBottom:14,lineHeight:1.5}}>You'll be assigned this load and the shipper will be notified. You must pick up by {load.pickup}.</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <button className="btn-b" style={{height:48,fontSize:13}} onClick={()=>onClaim(load)}>Yes, Claim It</button>
              <button className="btn-g" style={{height:48,fontSize:13}} onClick={()=>setConfirming(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Locked Board (active load in progress) ─────────────────────── */
function LockedBoard({ load, phase, onViewLoad }) {
  const phaseLabel = phase==='claimed' ? 'CLAIMED — AWAITING PICKUP' : 'IN TRANSIT';
  const phaseColor = phase==='claimed' ? '#F59E0B' : '#7C3AED';
  const nextAction = phase==='claimed' ? 'Head to the pickup location and mark as picked up when you arrive.' : 'You’re on the road. Mark as delivered when you reach the destination.';

  return (
    <div className="scroll-area" style={{padding:12}}>
      {/* Lock notice */}
      <div style={{background:'rgba(176,141,87,.08)',border:'1px solid #C9A876',borderRadius:8,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:18,flexShrink:0}}>🔒</span>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:'#C9A876'}}>Load board locked</div>
          <div style={{fontSize:12,color:'#808080',marginTop:2}}>Complete your current load to claim another.</div>
        </div>
      </div>

      {/* Active load card */}
      <div className="card" style={{padding:16,marginBottom:12}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:phaseColor,marginBottom:8}}>{phaseLabel}</div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:16,fontWeight:700,color:'#F5F5F5',marginBottom:2}}>{load.origin}</div>
        <div style={{fontSize:14,color:'#C9A876',marginBottom:10}}>→ {load.dest}</div>
        {/* Progress */}
        <div style={{height:6,background:'#2A2A2A',borderRadius:9999,overflow:'hidden',marginBottom:4}}>
          <div style={{height:'100%',width:phase==='claimed'?'15%':'55%',background:'linear-gradient(90deg,#C9A46A,#B08D57)',borderRadius:9999}} />
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#636E72',marginBottom:12}}>
          <span>{load.origin.split(',')[0]}</span>
          <span>{load.miles} mi</span>
          <span>{load.dest.split(',')[0]}</span>
        </div>
        <div style={{fontSize:13,color:'#808080',lineHeight:1.5,marginBottom:14,padding:'10px 12px',background:'#161616',borderRadius:6,border:'1px solid #2A2A2A'}}>
          {nextAction}
        </div>
        <button className="btn-b" style={{width:'100%',height:52,fontSize:14}} onClick={onViewLoad}>
          {phase==='claimed' ? 'Confirm Pickup →' : 'Confirm Delivery →'}
        </button>
      </div>

      {/* Shipper contact */}
      <div className="card" style={{padding:14}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#636E72',marginBottom:8}}>SHIPPER CONTACT</div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'#F5F5F5'}}>{load.shipper}</div>
            <div style={{fontSize:12,color:'#636E72'}}>{load.shipperPhone}</div>
          </div>
          <a href={`tel:${load.shipperPhone}`} style={{display:'flex',alignItems:'center',justifyContent:'center',width:48,height:48,background:'rgba(39,174,96,.12)',border:'1px solid #27AE60',borderRadius:8,fontSize:20,textDecoration:'none'}} aria-label="Call shipper">📞</a>
        </div>
      </div>
    </div>
  );
}
function ActiveLoadScreen({ load, phase, onPickup, onDelivery, onBack }) {
  const [confirmPickup, setConfirmPickup] = useState(false);
  const [confirmDeliver, setConfirmDeliver] = useState(false);

  return (
    <div className="scroll-area screen-enter" style={{paddingBottom:24}}>
      {/* Status bar */}
      <div style={{background:'#1A1A1A',padding:16,borderBottom:'1px solid #2A2A2A'}}>
        <div className="sec-lbl" style={{marginBottom:8,color: phase==='claimed'?'#F59E0B':'#7C3AED'}}>
          {phase==='claimed' ? '⚑ CLAIMED — AWAITING PICKUP' : '▶ IN TRANSIT'}
        </div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:17,fontWeight:700,color:'#F5F5F5',marginBottom:2}}>{load.origin}</div>
        <div style={{fontSize:14,color:'#C9A876',marginBottom:10}}>→ {load.dest}</div>
        {/* Progress track */}
        <div style={{height:6,background:'#2A2A2A',borderRadius:9999,overflow:'hidden',marginBottom:4}}>
          <div style={{height:'100%',width:phase==='claimed'?'15%':'55%',background:'linear-gradient(90deg,#C9A46A,#B08D57)',borderRadius:9999,transition:'width 600ms ease'}} />
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#636E72'}}>
          <span>{load.origin.split(',')[0]}</span>
          <span style={{color:phase==='intransit'?'#C9A876':'#3A3A3A'}}>En Route</span>
          <span>{load.dest.split(',')[0]}</span>
        </div>
      </div>

      {/* Key details */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:1,background:'#2A2A2A'}}>
        {[
          ['Pickup',load.pickup],
          ['Deliver by',load.deliver],
          ['Pay',`$${load.rate} flat`],
          ['Distance',`${load.miles} mi`],
        ].map(([k,v])=>(
          <div key={k} style={{background:'#161616',padding:'12px 14px'}}>
            <div className="sec-lbl" style={{marginBottom:4}}>{k}</div>
            <div style={{fontSize:14,fontWeight:600,color:'#F5F5F5'}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Shipper contact */}
      <div style={{padding:'14px 16px',borderBottom:'1px solid #2A2A2A'}}>
        <div className="sec-lbl" style={{marginBottom:10}}>SHIPPER CONTACT</div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600,color:'#F5F5F5'}}>{load.shipper}</div>
            <div style={{fontSize:12,color:'#636E72'}}>{load.shipperPhone}</div>
          </div>
          <a href={`tel:${load.shipperPhone}`} style={{display:'flex',alignItems:'center',justifyContent:'center',width:48,height:48,background:'rgba(39,174,96,.12)',border:'1px solid #27AE60',borderRadius:8,fontSize:20,textDecoration:'none'}} aria-label="Call shipper">📞</a>
        </div>
      </div>

      {load.notes && (
        <div style={{padding:'12px 16px',background:'rgba(245,158,11,.05)',borderBottom:'1px solid #2A2A2A'}}>
          <div className="sec-lbl" style={{color:'#F59E0B',marginBottom:6}}>INSTRUCTIONS</div>
          <div style={{fontSize:13,color:'#F5F5F5',lineHeight:1.6}}>{load.notes}</div>
        </div>
      )}

      {/* CTA */}
      <div style={{padding:16}}>
        {phase==='claimed' && !confirmPickup && (
          <button className="btn-b" style={{width:'100%',height:56,fontSize:15}} onClick={()=>setConfirmPickup(true)}>
            Mark as Picked Up
          </button>
        )}
        {phase==='claimed' && confirmPickup && (
          <div style={{background:'rgba(176,141,87,.08)',border:'1px solid #C9A876',borderRadius:10,padding:16}}>
            <div style={{fontSize:14,fontWeight:700,color:'#F5F5F5',marginBottom:6}}>Confirm pickup?</div>
            <div style={{fontSize:13,color:'#808080',marginBottom:14,lineHeight:1.5}}>
              This confirms you've collected the load from {load.shipper}. The shipper will be notified immediately.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <button className="btn-b" style={{height:48,fontSize:13}} onClick={onPickup}>Confirm Pickup</button>
              <button className="btn-g" style={{height:48,fontSize:13}} onClick={()=>setConfirmPickup(false)}>Cancel</button>
            </div>
          </div>
        )}
        {phase==='intransit' && !confirmDeliver && (
          <button className="btn-b" style={{width:'100%',height:56,fontSize:15}} onClick={()=>setConfirmDeliver(true)}>
            Mark as Delivered
          </button>
        )}
        {phase==='intransit' && confirmDeliver && (
          <div style={{background:'rgba(176,141,87,.08)',border:'1px solid #C9A876',borderRadius:10,padding:16}}>
            <div style={{fontSize:14,fontWeight:700,color:'#F5F5F5',marginBottom:6}}>Confirm delivery?</div>
            <div style={{fontSize:13,color:'#808080',marginBottom:14,lineHeight:1.5}}>
              You'll need to upload a Proof of Delivery (POD) photo on the next screen to complete this load.
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <button className="btn-b" style={{height:48,fontSize:13}} onClick={onDelivery}>Yes, Delivered</button>
              <button className="btn-g" style={{height:48,fontSize:13}} onClick={()=>setConfirmDeliver(false)}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── POD Upload Screen ───────────────────────────────────────────── */
function PODScreen({ load, onComplete }) {
  const [uploaded, setUploaded] = useState(false);
  const fileRef = useRef();

  return (
    <div className="scroll-area screen-enter" style={{padding:16,paddingBottom:32}}>
      <div style={{background:'#1A1A1A',border:'1px solid #2A2A2A',borderRadius:10,padding:16,marginBottom:16}}>
        <div className="sec-lbl" style={{color:'#27AE60',marginBottom:8}}>✓ LOAD DELIVERED</div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:16,fontWeight:700,color:'#F5F5F5',marginBottom:2}}>{load.origin} → {load.dest}</div>
        <div style={{fontSize:13,color:'#636E72'}}>Upload POD to complete and receive payment</div>
      </div>

      <div className="sec-lbl" style={{marginBottom:12}}>PROOF OF DELIVERY</div>

      {/* Upload zone */}
      {!uploaded ? (
        <div
          onClick={()=>fileRef.current?.click()}
          style={{background:'#161616',border:'2px dashed #3A3A3A',borderRadius:10,padding:'32px 16px',textAlign:'center',cursor:'pointer',marginBottom:16,transition:'border-color 150ms'}}
          onMouseEnter={e=>e.currentTarget.style.borderColor='#C9A876'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='#3A3A3A'}
        >
          <div style={{fontSize:36,marginBottom:8}}>📷</div>
          <div style={{fontSize:14,fontWeight:600,color:'#F5F5F5',marginBottom:4}}>Tap to take photo or upload</div>
          <div style={{fontSize:12,color:'#636E72'}}>JPEG, PNG, or WebP · Max 25MB</div>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={()=>setUploaded(true)} />
        </div>
      ) : (
        <div style={{background:'rgba(39,174,96,.1)',border:'1px solid #27AE60',borderRadius:10,padding:16,marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:28}}>📸</span>
          <div>
            <div style={{fontSize:14,fontWeight:600,color:'#27AE60'}}>POD uploaded</div>
            <div style={{fontSize:12,color:'#636E72'}}>delivery_confirmation.jpg</div>
          </div>
          <button onClick={()=>setUploaded(false)} style={{marginLeft:'auto',background:'none',border:'none',color:'#636E72',cursor:'pointer',fontSize:16}}>×</button>
        </div>
      )}

      <div style={{background:'#1A1A1A',border:'1px solid #2A2A2A',borderRadius:8,padding:14,marginBottom:16}}>
        <div className="sec-lbl" style={{marginBottom:10}}>DELIVERY SUMMARY</div>
        {[['Load',`#${load.id}`],['Route',`${load.origin.split(',')[0]} → ${load.dest.split(',')[0]}`],['Gross Pay',`$${load.rate}`],['Payment Terms','Net 30']].map(([k,v])=>(
          <div key={k} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #2A2A2A',fontSize:13}}>
            <span style={{color:'#636E72'}}>{k}</span>
            <span style={{color:'#F5F5F5',fontWeight:600}}>{v}</span>
          </div>
        ))}
      </div>

      <button className="btn-b" style={{width:'100%',height:56,fontSize:15,opacity:uploaded?1:0.4}} disabled={!uploaded} onClick={onComplete}>
        Complete Load & Submit →
      </button>
      {!uploaded && <div style={{textAlign:'center',fontSize:12,color:'#636E72',marginTop:8}}>Upload a POD photo to continue</div>}
    </div>
  );
}

/* ── My Stats ────────────────────────────────────────────────────── */

    <div className="scroll-area" style={{padding:16}}>
      {/* Earnings hero */}
      <div className="card" style={{padding:20,marginBottom:16,textAlign:'center'}}>
        <div className="sec-lbl" style={{marginBottom:6}}>EARNINGS THIS MONTH</div>
        <div style={{fontFamily:'Sora,sans-serif',fontSize:44,fontWeight:900,color:'#27AE60',lineHeight:1}}>$8,420</div>
        <div style={{fontSize:13,color:'#636E72',marginTop:6}}>12 loads · avg $702/load</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
        {[['ON-TIME RATE','97%','#27AE60'],['AVG RPM','$1.82/mi','#C9A876'],['LOADS','12','#F5F5F5'],['MILES','3,840','#F5F5F5']].map(([l,v,c])=>(
          <div key={l} className="card" style={{padding:14}}>

          <div>
            <div style={{fontSize:14,fontWeight:700,color:'#F5F5F5'}}>{OO_PROFILE.equipLabel}</div>
            <div style={{fontSize:12,color:'#636E72'}}>Plate: {OO_PROFILE.plate} · DOT: {OO_PROFILE.dot}</div>
          </div>
          <span style={{fontSize:11,padding:'2px 8px',borderRadius:9999,fontWeight:700,textTransform:'uppercase',background:'rgba(39,174,96,.12)',color:'#27AE60',border:'1px solid #27AE60'}}>Active</span>

/* ── Settings ────────────────────────────────────────────────────── */
function Settings() {
  return (
    <div className="scroll-area" style={{padding:16}}>
      {[
        ['⚙','Cost Profile','Set CPM, fuel & maintenance costs'],
        ['💰','Payments','Earnings, invoices & bank account'],
        ['📋','Load History','All completed loads'],

/* ── Success Screen ──────────────────────────────────────────────── */
function SuccessScreen({ load, onDone }) {
  return (
    <div className="scroll-area screen-enter" style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'48px 24px',textAlign:'center'}}>
      <div style={{width:80,height:80,borderRadius:'50%',background:'rgba(39,174,96,.15)',border:'2px solid #27AE60',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,marginBottom:24}}>✓</div>
      <div style={{fontFamily:'Sora,sans-serif',fontSize:22,fontWeight:700,color:'#F5F5F5',marginBottom:8}}>Load Complete!</div>
      <div style={{fontSize:14,color:'#636E72',marginBottom:24,lineHeight:1.6}}>
        {load.origin} → {load.dest}<br />
        POD submitted · Payment of <span style={{color:'#27AE60',fontWeight:700}}>${load.rate}</span> processing
      </div>
      <button className="btn-b" style={{width:'100%',height:52,fontSize:15}} onClick={onDone}>Back to Load Board</button>
    </div>
  );
}

/* ── App ─────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState('board');
  const [screen, setScreen] = useState('main'); // main | detail | active | pod | success
  const [activeLoad, setActiveLoad] = useState(null);
  const [loadPhase, setLoadPhase] = useState(null); // claimed | intransit
  const [detailLoad, setDetailLoad] = useState(null);

  function handleClaim(load) {
    setActiveLoad(load);
    setLoadPhase('claimed');
    setScreen('main');   // return to dashboard — board will lock
    setTab('board');
  }
  function handlePickup() {
    setLoadPhase('intransit');
    setScreen('main');   // return to dashboard — hero updates to In Transit
    setTab('board');
  }
  function handleDelivery() {
    setScreen('pod');
  }
  function handlePODComplete() {
    setActiveLoad(null);
    setLoadPhase(null);
    setScreen('main');   // return to dashboard — board unlocks
    setTab('board');
  }
  function handleDone() {
    setActiveLoad(null);
    setLoadPhase(null);
    setScreen('main');
    setTab('board');
  }

  const TABS = [
    {id:'board', icon:'⊞', label:'Board'},
    {id:'stats', icon:'📊', label:'My Stats'},
    {id:'settings', icon:'⚙', label:'Settings'},
  ];

  if (screen==='detail') return (
    <div style={{display:'flex',justifyContent:'center',background:'#0a0a0a',minHeight:'100vh'}}>
      <div className="phone">
        <Header onBack={()=>setScreen('main')} title={`Load ${detailLoad?.id}`} />
        <LoadDetail load={detailLoad} onClaim={handleClaim} onBack={()=>setScreen('main')} />
      </div>
    </div>
  );

  if (screen==='active') return (
    <div style={{display:'flex',justifyContent:'center',background:'#0a0a0a',minHeight:'100vh'}}>
      <div className="phone">
        <Header onBack={()=>setScreen('main')} title={loadPhase==='claimed'?'Active Load':'In Transit'} />
        <ActiveLoadScreen load={activeLoad} phase={loadPhase} onPickup={handlePickup} onDelivery={handleDelivery} onBack={()=>setScreen('main')} />
      </div>
    </div>
  );

  if (screen==='pod') return (
    <div style={{display:'flex',justifyContent:'center',background:'#0a0a0a',minHeight:'100vh'}}>
      <div className="phone">
        <Header onBack={()=>setScreen('active')} title="Proof of Delivery" />
        <PODScreen load={activeLoad} onComplete={handlePODComplete} />
      </div>
    </div>
  );

  if (screen==='success') return (
    <div style={{display:'flex',justifyContent:'center',background:'#0a0a0a',minHeight:'100vh'}}>
      <div className="phone">
        <Header title="Load Complete" />
        <SuccessScreen load={activeLoad} onDone={handleDone} />
      </div>
    </div>
  );

  // Main dashboard
  return (
    <div style={{display:'flex',justifyContent:'center',background:'#0a0a0a',minHeight:'100vh'}}>
      <div className="phone">
        <Header />
        {activeLoad && <ActiveHero load={activeLoad} onViewDetails={()=>setScreen('active')} />}
        <DieselTicker />
        {/* Tab content */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
          {tab==='board' && !activeLoad && <LoadBoard onDetail={l=>{setDetailLoad(l);setScreen('detail');}} />}
          {tab==='board' && activeLoad  && <LockedBoard load={activeLoad} phase={loadPhase} onViewLoad={()=>setScreen('active')} />}
          {tab==='stats'    && <MyStats />}
          {tab==='settings' && <Settings />}
        </div>
        {/* Bottom tab bar */}
        <nav style={{display:'flex',background:'#1A1A1A',borderTop:'1px solid #2A2A2A',flexShrink:0}} aria-label="Main navigation">
          {TABS.map(t=>(
            <button key={t.id} className={`tab-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)} aria-selected={tab===t.id} role="tab">
              <span style={{fontSize:16}}>{t.icon}</span>
              <span>{t.label}</span>
            </button>
          ))}
        </nav>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
