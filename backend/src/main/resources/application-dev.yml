spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freightclub_db?currentSchema=freightclub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: freightclub
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true
    repair-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none

server:
  port: 8080

logging:
  level:
    org.springframework.security: DEBUG
    com.freightclub: DEBUG
  file:
    name: /c/projects/freightclub/backend/logs/dev.log

app:
  cors:
    allowed-origins: http://localhost:9001,http://localhost:9090,http://localhost:5173
  cookie:
    secure: false
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-change-in-production-at-least-32-chars}
    issuer: freightclub
    audience: freightclub-api
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
