# Local development overrides — never commit real secrets
spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  datasource:
    url: jdbc:postgresql://localhost:5432/freightclub?currentSchema=freightclub,public
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FreightClubPool
      maximum-pool-size: 10
      connection-init-sql: SET row_security = on;

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: freightclub
        show_sql: true
        format_sql: true
        session_factory:
          statement_inspector: com.freightclub.security.TenantInterceptor

  flyway:
    enabled: true
    schemas: freightclub
    create-schemas: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/freightclub?currentSchema=freightclub,public
    user: ${FLYWAY_USER:postgres}
    password: ${FLYWAY_PASSWORD:postgres}

server:
  port: 9090

app:
  jwt:
    # 64-char hex string — replace with your own before committing real services
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  eia:
    enabled: true
    api-key: dnLA3lqSTpjXMf3H5yJHCgkAqftPVUjYkPFI78Mv
  cors:
    allowed-origins: http://localhost:8080,http://mikebarnes.tail67dcb4.ts.net:8080,https://mikebarnes.tail67dcb4.ts.net
  storage:
    local-path: ${user.home}/freightclub-uploads

logging:
  level:
    com.freightclub: DEBUG
    org.springframework.security: DEBUG
