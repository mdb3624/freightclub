spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: freightclub
    baseline-on-migrate: true
    validate-on-migrate: false
    out-of-order: true

  jpa:
    hibernate:
      ddl-auto: none

server:
  port: ${PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://freightclub.app,https://freightclub-frontend-5gecbdg27a-uc.a.run.app}
  cookie:
    secure: true
  storage:
    local-path: /tmp/freightclub-uploads
  jwt:
    secret: ${APP_JWT_SECRET}
    issuer: ${JWT_ISSUER:freightclub}
    audience: ${JWT_AUDIENCE:freightclub-api}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
