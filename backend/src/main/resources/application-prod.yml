# Production environment configuration
# All sensitive values must be supplied as environment variables — never hardcode secrets here.

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

server:
  port: ${SERVER_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET}
    issuer: freightclub
    audience: freightclub-api
    access-token-expiry-ms: ${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_TOKEN_EXPIRY_MS:604800000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  storage:
    local-path: ${STORAGE_PATH}

logging:
  level:
    com.freightclub: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
