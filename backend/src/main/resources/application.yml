logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{correlationId}] %-5level %logger{36} - %msg%n"

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FreightClubPool
      maximum-pool-size: 10
      connection-init-sql: SET row_security = on;

  flyway:
    url: jdbc:postgresql://${FLYWAY_HOST:${DB_HOST}}:${FLYWAY_PORT:${DB_PORT}}/${DB_NAME}
    user: ${FLYWAY_USER}
    password: ${FLYWAY_PASSWORD}
    schemas: freightclub
    sql-migration-prefix: V
    sql-migration-separator: __

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  email:
    enabled: ${EMAIL_ENABLED:false}
    from: ${EMAIL_FROM:noreply@freightclub.app}
  eia:
    enabled: ${EIA_ENABLED:false}
    api-key: ${EIA_API_KEY:}
  jwt:
    secret: ${JWT_SECRET}
    issuer: freightclub
    audience: freightclub-api
    access-token-expiry-ms: 900000       # 15 minutes
    refresh-token-expiry-ms: 604800000   # 7 days
  default-tenant-id: 00000000-0000-0000-0000-000000000001
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
