spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: freightclub
    baseline-on-migrate: true
    user: ${FLYWAY_DB_USERNAME:${DB_USERNAME}}
    password: ${FLYWAY_DB_PASSWORD:${DB_PASSWORD}}
    url: ${FLYWAY_DB_URL:${spring.datasource.url}}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate.hbm2ddl.auto: none

server:
  port: ${PORT:9090}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
  eia:
    api-key: ${EIA_API_KEY:}
    enabled: ${EIA_ENABLED:false}
  jwt:
    secret: ${APP_JWT_SECRET}
    issuer: ${JWT_ISSUER:freightclub}
    audience: ${JWT_AUDIENCE:freightclub-api}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}

twilio:
  enabled: ${TWILIO_ENABLED:false}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  platform-fee-percent: ${STRIPE_PLATFORM_FEE_PERCENT:1.75}
  enabled: ${STRIPE_ENABLED:false}
