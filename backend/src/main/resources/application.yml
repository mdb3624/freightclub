spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    schemas: freightclub
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${PORT:9090}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}
  jwt:
    secret: ${APP_JWT_SECRET}
    issuer: ${JWT_ISSUER:freightclub}
    audience: ${JWT_AUDIENCE:freightclub-api}
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
