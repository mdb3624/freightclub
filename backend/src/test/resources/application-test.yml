spring:
  datasource:
    # Connect to native PostgreSQL (localhost:5432)
    # mvn test runs against native PostgreSQL, not Docker
    url: jdbc:postgresql://localhost:5432/freightclub_db?currentSchema=freightclub
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:N1kk101!}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate.hbm2ddl.import_files_sql_extractor: org.hibernate.tool.schema.internal.script.SingleLineSqlScriptExtractor

  flyway:
    enabled: true
    schemas: freightclub
    baseline-on-migrate: true
    validate-on-migrate: false
    placeholders:
      test_mode: 'true'

  sql:
    init:
      mode: always
      data-locations: classpath:db/test-data.sql

  mail:
    host: localhost
    port: 3025

  security:
    user:
      name: test-user
      password: test-password

app:
  jwt:
    secret: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
    issuer: freightclub-test
    audience: freightclub-api-test
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  default-tenant-id: 00000000-0000-0000-0000-000000000001
  cors:
    allowed-origins: http://localhost
  eia:
    enabled: false
  storage:
    path: ${java.io.tmpdir}/freightclub-test-uploads

server:
  port: 0

logging:
  level:
    org.hibernate.SQL: DEBUG