spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: false

app:
  jwt:
    # 48 zero-bytes in base64 — valid HMAC-SHA384 key for integration tests only
    secret: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
    issuer: freightclub-test
    audience: freightclub-api-test
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  default-tenant-id: 00000000-0000-0000-0000-000000000001
  cors:
    allowed-origins: http://localhost
  storage:
    path: ${java.io.tmpdir}/freightclub-test-uploads

server:
  port: 0

logging:
  level:
    root: WARN
    com.freightclub: INFO
