spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/freightclub_db?currentSchema=freightclub}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:N1kk101!}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
      format_sql: true
      use_sql_comments: true
    show-sql: false
    properties:
      hibernate.hbm2ddl.import_files_sql_extractor: org.hibernate.tool.schema.internal.script.SingleLineSqlScriptExtractor
      hibernate.dialect.fetch_size: 50
      hibernate.jdbc.batch_size: 20
      hibernate.hbm2ddl.auto: none
      hibernate.schema_update.unique_constraint_strategy: skip
      jakarta.persistence.schema-generation.scripts.action: none
      jakarta.persistence.schema-generation.database.action: none

  flyway:
    enabled: true
    schemas: freightclub
    baseline-on-migrate: true
    validate-on-migrate: false
    locations: classpath:db/migration
    placeholders:
      test_mode: 'true'

  sql:
    init:
      mode: never

  mail:
    host: localhost
    port: 3025

  security:
    user:
      name: test-user
      password: test-password

app:
  jwt:
    secret: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
    issuer: freightclub-test
    audience: freightclub-api-test
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000
  default-tenant-id: 00000000-0000-0000-0000-000000000001
  cors:
    allowed-origins: http://localhost
  eia:
    enabled: false
  storage:
    path: ${java.io.tmpdir}/freightclub-test-uploads

server:
  port: 0

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.springframework.test.context.cache: DEBUG
    com.freightclub.security.TenantContextHolder: DEBUG