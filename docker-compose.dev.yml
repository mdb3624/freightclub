version: '3.9'

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: freightclub_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: N1kk101!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d freightclub_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://db:5432/freightclub_db?currentSchema=freightclub
      DB_USERNAME: postgres
      DB_PASSWORD: N1kk101!
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_PORT: 9090
      VITE_API_URL: http://backend:8080
    ports:
      - "9090:9090"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
