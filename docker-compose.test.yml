version: '3.9'

services:

  db-test:
    image: postgis/postgis:16-3.4
    container_name: freightclub-test-db
    environment:
      POSTGRES_DB: freightclub_test
      POSTGRES_USER: freightclub_runtime
      POSTGRES_PASSWORD: freightclub
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pgrowlocks"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightclub_runtime -d freightclub_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freightclub-test-backend
    ports:
      - "9091:9091"
    depends_on:
      db-test:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: test
      PORT: 9091
      DB_URL: jdbc:postgresql://db-test:5432/freightclub_test?currentSchema=freightclub
      DB_USERNAME: freightclub_runtime
      DB_PASSWORD: freightclub
      APP_JWT_SECRET: test-secret-32-chars-minimum-required-here
      JWT_SECRET: test-secret-32-chars-minimum-required-here
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:9090
      STORAGE_PATH: /app/uploads
      app.cookie.secure: "false"
    volumes:
      - uploads_test_data:/app/uploads

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: freightclub-test-frontend
    ports:
      - "9090:9090"
    depends_on:
      backend-test:
        condition: service_healthy
    environment:
      VITE_PORT: 9090
      VITE_API_URL: http://backend-test:9091
      NODE_ENV: development
    volumes:
      # Live-mount source so Vite HMR picks up changes instantly — no image rebuild needed
      - ./frontend:/app
      # Keep the container's node_modules (built during image build) intact
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: npm run dev -- --host

volumes:
  postgres_test_data:
  uploads_test_data:
