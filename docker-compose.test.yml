version: '3.9'

services:

  test-db:
    image: postgis/postgis:16-3.4
    container_name: freightclub-test-db
    environment:
      POSTGRES_DB: freightclub_test
      # US-857: this is the Postgres bootstrap superuser, used ONLY for Flyway migrations
      # (creating roles/policies). It is deliberately NOT named freightclub_runtime — that
      # name is reserved for the real, non-superuser app role created by the migrations
      # (V20260422_11 / V20260721_1404), matching prod's neondb_owner-vs-freightclub_runtime
      # split. Superusers bypass RLS unconditionally regardless of BYPASSRLS, so running the
      # app as the bootstrap user would make every RLS-enforcement test pass for the wrong
      # reason — this was the actual gap AC-5 exists to close.
      POSTGRES_USER: freightclub_test_admin
      POSTGRES_PASSWORD: freightclub_admin
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pgrowlocks -c max_connections=200"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freightclub_test_admin -d freightclub_test"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: freightclub-test-backend
    ports:
      - "9091:9091"
    depends_on:
      test-db:
        condition: service_healthy
    env_file:
      - .env.test
    environment:
      SPRING_PROFILES_ACTIVE: test
      PORT: 9091
      DB_URL: jdbc:postgresql://test-db:5432/freightclub_test?currentSchema=freightclub
      # App traffic (JPA/Hibernate) runs as the real, non-superuser freightclub_runtime —
      # RLS actually applies to this connection now (US-857).
      DB_USERNAME: freightclub_runtime
      DB_PASSWORD: freightclub_runtime_pw
      # Flyway (migrations: CREATE ROLE, CREATE POLICY, GRANT) needs the bootstrap
      # superuser — freightclub_runtime doesn't have DDL/role-management privileges.
      FLYWAY_DB_USERNAME: freightclub_test_admin
      FLYWAY_DB_PASSWORD: freightclub_admin
      # Pre-auth-only role (login email lookup, registration join-code lookup) — see
      # V20260721_1400. SELECT-only, two tables, two columns sets.
      DB_LOGIN_USER: freightclub_login_lookup
      DB_LOGIN_PASSWORD: freightclub_login
      APP_JWT_SECRET: test-secret-32-chars-minimum-required-here
      JWT_SECRET: test-secret-32-chars-minimum-required-here
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:9090
      STORAGE_PATH: /app/uploads
      app.cookie.secure: "false"
    volumes:
      - uploads_test_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend-tester:
    image: maven:3.9-eclipse-temurin-21
    container_name: freightclub-tester
    depends_on:
      test-db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - maven_repo:/root/.m2
    working_dir: /app
    environment:
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:postgresql://test-db:5432/freightclub_test?currentSchema=freightclub
      DB_USERNAME: freightclub_runtime
      DB_PASSWORD: freightclub_runtime_pw
      FLYWAY_DB_USERNAME: freightclub_test_admin
      FLYWAY_DB_PASSWORD: freightclub_admin
      DB_LOGIN_USER: freightclub_login_lookup
      DB_LOGIN_PASSWORD: freightclub_login
    command: mvn clean test

  frontend-test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: freightclub-test-frontend
    ports:
      - "9090:9090"
    depends_on:
      backend-test:
        condition: service_healthy
    environment:
      VITE_PORT: 9090
      VITE_API_URL: http://backend-test:9091
      TEST_BACKEND_URL: http://backend-test:9091
      TEST_FRONTEND_URL: http://localhost:9090
      NODE_ENV: development
      DOCKER: "true"
    volumes:
      # Live-mount source so Vite HMR picks up changes instantly — no image rebuild needed
      - ./frontend:/app
      # Keep the container's node_modules (built during image build) intact
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: npm run dev -- --host

volumes:
  postgres_test_data:
  uploads_test_data:
  maven_repo:
