# DEV environment: PostgreSQL database only.
# The Spring Boot app runs natively via: mvn spring-boot:run
# Usage: docker compose up -d db

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: freightclub
      POSTGRES_USER: ${DB_RUNTIME_USER:-freightclub_runtime}
      POSTGRES_PASSWORD: ${DB_RUNTIME_PASSWORD:-freightclub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_RUNTIME_USER:-freightclub_runtime} -d freightclub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
