services:

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: freightclub
      MYSQL_USER: ${DB_USERNAME:-freightclub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-freightclub}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: freightclub
      DB_USERNAME: ${DB_USERNAME:-freightclub}
      DB_PASSWORD: ${DB_PASSWORD:-freightclub}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      STORAGE_PATH: /app/uploads
    volumes:
      - uploads_data:/app/uploads

volumes:
  mysql_data:
  uploads_data:
