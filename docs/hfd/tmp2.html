<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreightClub Golden Master</title>
    <style>
        /* --- 1. THE SKIN (Tokens) --- */
        :root {
            --fc-gold: #9b7a3a;
            --fc-gold-dark: #7c602d;
            --fc-cream: #f4f1e8;
            --fc-panel: #ffffff;
            --fc-border: #d6d0c3;
            --text-main: #222;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--fc-cream); padding: 25px; }

        /* --- 2. THE SKELETON (Framework) --- */
        .fc-shell { max-width: 1600px; margin: auto; }

        /* HEADER WIDGET (New Component) */
        .header-panel {
            background: var(--fc-panel);
            border: 1px solid var(--fc-border);
            border-radius: 4px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-logo { font-size: 24px; font-weight: 800; color: var(--fc-gold-dark); text-transform: uppercase; }
        .user-cameo { 
            width: 40px; height: 40px; 
            border-radius: 50%; 
            border: 2px solid var(--fc-gold); 
            background: #eee;
        }

        /* Standard Panels */
        .panel { background: var(--fc-panel); border: 1px solid var(--fc-border); border-radius: 4px; margin-bottom: 24px; overflow: hidden; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--fc-border); background: rgba(0,0,0,0.02); font-weight: bold; color: var(--fc-gold-dark); }
        .widget-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; }
        .widget { border: 1px solid #eee; padding: 16px; border-radius: 4px; }
        
        .fc-btn { background: var(--fc-gold); color: white; border: none; padding: 10px; border-radius: 4px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="fc-shell">

        <header class="header-panel">
            <div class="brand-logo">MDB LOGISTICS</div>
            <div class="user-cameo"></div>
        </header>

        <div class="panel">
            <div class="panel-header">KPI Summary</div>
            <div class="widget-grid">
                <div class="widget"><div class="label">ACTIVE SHIPMENTS</div><div class="value">24</div></div>
                <div class="widget"><div class="label">EST. COST/MILE</div><div class="value">$2.11</div></div>
                <div class="widget"><div class="label">ON-TIME RATE</div><div class="value">96%</div></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Action Zone</div>
            <div class="widget-grid" style="grid-template-columns: 1fr 1fr;">
                <div class="widget">
                    <h3>Quick Actions</h3>
                    <button class="fc-btn">Create New Load</button>
                </div>
                <div class="widget">
                    <h3>Carrier Search</h3>
                    <input type="text" placeholder="Search..." style="width: 100%; padding: 8px;">
                </div>
            </div>
        </div>

    </div>
</body>
</html>
