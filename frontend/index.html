<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreightClub</title>
</head>
<body>
  <div id="root"></div>

  <!-- Load login app by default -->
  <script type="module" src="/src/apps/login-app/main.tsx"></script>

  <!-- Check if user is already authenticated -->
  <script>
    fetch('/api/v1/auth/status', { credentials: 'include' })
      .then(r => {
        if (r.ok) {
          // User has valid auth cookie, load main app
          // React Router will handle navigation to dashboard
          import('/src/main.tsx')
        } else if (r.status === 401) {
          // Not authenticated; login form already loaded
          // Nothing to do
        } else {
          console.warn('Auth status check returned:', r.status)
        }
      })
      .catch(err => {
        console.error('Auth check failed:', err)
        // Login form already loaded as fallback
      })
  </script>
</body>
</html>
